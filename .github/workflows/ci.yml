name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

env:
  PRISMA_GENERATE_SKIP_AUTOINSTALL: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Lint
        run: pnpm --recursive lint

      - name: Generate Prisma Client
        run: pnpm --filter @lms/api prisma:generate

      - name: Typecheck
        run: pnpm --recursive typecheck

      - name: Tests
        run: pnpm --recursive test:coverage

      - name: Build
        run: pnpm --recursive build

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t lms-api:ci .

      - name: Build Web Docker image
        run: docker build -f apps/web/Dockerfile -t lms-web:ci .
