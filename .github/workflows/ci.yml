name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  ci:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate initial Prisma migration
        run: |
          MIGRATION_DIR="apps/api/prisma/migrations/20260524115000_init"
          rm -rf apps/api/prisma/migrations
          mkdir -p "$MIGRATION_DIR"
          pnpm --dir apps/api exec prisma migrate diff --from-empty --to-schema-datamodel prisma/schema.prisma --script > "$MIGRATION_DIR/migration.sql"
          test -s "$MIGRATION_DIR/migration.sql"
          grep -q 'CREATE TABLE "organizations"' "$MIGRATION_DIR/migration.sql"
          printf '# Please do not edit this file manually\nprovider = "postgresql"\n' > apps/api/prisma/migrations/migration_lock.toml
          if [ -n "$(git status --porcelain apps/api/prisma/migrations)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/api/prisma/migrations
            git commit -m "chore: fix initial Prisma migration"
            git push
          fi

      - name: Generate Prisma Client
        run: pnpm --filter @lms/api prisma:generate

      - name: Typecheck
        run: pnpm --recursive typecheck

      - name: Build
        run: pnpm --recursive build
