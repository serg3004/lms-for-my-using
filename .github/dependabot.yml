version: 2
updates:
  # GitHub Actions — weekly, all grouped
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - "*"

  # npm/pnpm root workspace
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
    groups:
      root-dev:
        dependency-type: development
        patterns:
          - "*"

  # API workspace
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
    groups:
      api-dev:
        dependency-type: development
        patterns:
          - "*"
      api-prod:
        dependency-type: production
        patterns:
          - "*"

  # Web workspace
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-i18next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "i18next"
        update-types: ["version-update:semver-major"]
    groups:
      web-dev:
        dependency-type: development
        patterns:
          - "*"
      web-prod:
        dependency-type: production
        patterns:
          - "*"
