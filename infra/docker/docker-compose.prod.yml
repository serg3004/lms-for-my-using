# Production Docker Compose
# Usage: docker compose -f infra/docker/docker-compose.prod.yml --env-file infra/docker/.env up -d
#
# Before first run:
#   cp infra/docker/.env.example infra/docker/.env
#   # Edit .env with real secrets
#   docker compose -f infra/docker/docker-compose.prod.yml build
#   docker compose -f infra/docker/docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lms}
      POSTGRES_USER: ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms_user} -d ${POSTGRES_DB:-lms}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: lms-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: "3000"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    networks:
      - lms_internal
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: lms-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - lms_internal
    depends_on:
      - api

networks:
  lms_internal:
    driver: bridge

volumes:
  postgres_data:
